<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Draw Bridge Pro - Extreme</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; touch-action: none; font-family: sans-serif; background: #000; }
        canvas { display: block; }
    </style>
</head>
<body class="bg-slate-900">

    <div class="fixed top-5 left-1/2 -translate-x-1/2 bg-black/80 backdrop-blur-md px-8 py-4 rounded-3xl flex gap-6 items-center z-10 shadow-2xl border border-white/10 text-white">
        <div class="flex flex-col items-center">
            <span class="text-xs uppercase opacity-60 tracking-widest">Level</span>
            <span id="level-ui" class="font-bold text-2xl text-blue-400">1</span>
        </div>
        <div class="h-10 w-[1px] bg-white/20"></div>
        <div class="flex flex-col items-center">
            <span class="text-xs uppercase opacity-60 tracking-widest">Coins</span>
            <span id="coins-ui" class="font-bold text-2xl text-yellow-400">0</span>
        </div>
        <button onclick="useHint()" class="bg-yellow-500 hover:bg-yellow-400 text-black px-5 py-2 rounded-2xl font-bold transition-transform active:scale-90 shadow-lg text-sm">HINT (-5)</button>
        <button onclick="resetRun()" class="bg-red-500 hover:bg-red-400 px-5 py-2 rounded-2xl font-bold transition-transform active:scale-90 shadow-lg text-sm">RESET</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const levelUI = document.getElementById('level-ui');
        const coinsUI = document.getElementById('coins-ui');

        // Sounds Function
        function playBeep(freq) {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.3);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            } catch(e) {}
        }

        let gameState = {
            level: 1,
            coins: 0,
            drawing: false,
            path: [],
            sortedPath: [],
            pathIndex: 0,
            started: false,
            showHint: false,
            car: { x: 80, y: 300, w: 60, h: 30, speed: 4, color: "#ff4d4f" },
            finishX: 0,
            obstacles: [],
            status: "idle", 
            bgColors: ["#0f2027", "#203a43"]
        };

        function init() {
            window.addEventListener('resize', resize);
            resize();
            loadLevel(1);
            
            canvas.addEventListener('mousedown', (e) => gameState.status === "fail" ? resetRun() : startDrawing(e));
            canvas.addEventListener('mousemove', draw);
            window.addEventListener('mouseup', stopDrawing);
            
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault();
                gameState.status === "fail" ? resetRun() : startDrawing(e.touches[0]);
            }, {passive: false});
            canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e.touches[0]); }, {passive: false});
            window.addEventListener('touchend', stopDrawing);

            requestAnimationFrame(gameLoop);
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            gameState.finishX = canvas.width - 120;
        }

        function loadLevel(lvl) {
            gameState.level = lvl;
            levelUI.innerText = lvl;
            const hue = (lvl * 70) % 360; 
            gameState.bgColors = [`hsl(${hue}, 40%, 12%)`, `hsl(${hue + 40}, 40%, 5%)`];
            
            gameState.obstacles = [];
            const count = Math.min(2 + Math.floor(lvl / 1.5), 15);
            for(let i=0; i < count; i++) {
                const isOrbiter = Math.random() > 0.6;
                const ox = canvas.width * (0.25 + Math.random() * 0.5);
                const oy = 150 + Math.random() * (canvas.height - 300);

                gameState.obstacles.push({
                    type: isOrbiter ? 'orbiter' : 'patrol',
                    x: ox, y: oy, baseX: ox, baseY: oy,
                    w: 40, h: 40,
                    angle: Math.random() * Math.PI * 2,
                    radius: 40 + Math.random() * 60,
                    dir: 1,
                    speed: 1.5 + (lvl * 0.1)
                });
            }
            resetRun();
        }

        function resetRun() {
            gameState.started = false;
            gameState.drawing = false;
            gameState.path = [];
            gameState.sortedPath = [];
            gameState.pathIndex = 0;
            gameState.car.x = 80;
            gameState.car.y = 300;
            gameState.status = "idle";
            gameState.showHint = false;
        }

        function useHint() {
            if (gameState.coins >= 5 && !gameState.showHint) {
                gameState.coins -= 5;
                coinsUI.innerText = gameState.coins;
                gameState.showHint = true;
            }
        }

        function startDrawing(e) {
            if (gameState.status !== "idle" || gameState.started) return;
            gameState.drawing = true;
            gameState.path = [{ x: e.clientX, y: e.clientY }];
        }

        function draw(e) {
            if (!gameState.drawing) return;
            gameState.path.push({ x: e.clientX, y: e.clientY });
        }

        function stopDrawing() {
            if (!gameState.drawing) return;
            gameState.drawing = false;
            gameState.sortedPath = [...gameState.path];
            if (gameState.sortedPath.length > 5) gameState.started = true;
        }

        function gameLoop() {
            // Draw Background
            const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
            grad.addColorStop(0, gameState.bgColors[0]);
            grad.addColorStop(1, gameState.bgColors[1]);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Update Obstacle Positions
            gameState.obstacles.forEach(o => {
                if (o.type === 'patrol') {
                    o.y += o.dir * o.speed;
                    if (o.y < 100 || o.y > canvas.height - 150) o.dir *= -1;
                } else {
                    o.angle += o.speed * 0.02;
                    o.x = o.baseX + Math.cos(o.angle) * o.radius;
                    o.y = o.baseY + Math.sin(o.angle) * o.radius;
                }
            });

            // Car Physics Logic
            if (gameState.started && gameState.status === "idle") {
                const target = gameState.sortedPath[gameState.pathIndex];
                if (target) {
                    const dx = target.x - gameState.car.x;
                    const dy = target.y - gameState.car.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < gameState.car.speed) gameState.pathIndex++;
                    else {
                        gameState.car.x += (dx/dist) * gameState.car.speed;
                        gameState.car.y += (dy/dist) * gameState.car.speed;
                    }
                } else {
                    gameState.car.y += 8; 
                }

                // Check for obstacle hits
                gameState.obstacles.forEach(o => {
                    if(gameState.car.x + 25 > o.x && gameState.car.x - 25 < o.x + o.w && 
                       gameState.car.y + 10 > o.y && gameState.car.y - 10 < o.y + o.h) {
                        gameState.status = "fail";
                        playBeep(150);
                    }
                });
            }

            // Win or Fall Check
            if (gameState.car.y > canvas.height + 50 && gameState.status === "idle") {
                gameState.status = "fail";
                playBeep(150);
            }
            if (gameState.car.x > gameState.finishX && gameState.status === "idle") {
                gameState.status = "win";
                gameState.coins += 10;
                coinsUI.innerText = gameState.coins;
                playBeep(550);
                setTimeout(() => { if(gameState.status === "win") loadLevel(gameState.level + 1); }, 1500);
            }

            // Draw the Bridge Line
            if (gameState.path.length > 1) {
                ctx.beginPath();
                ctx.strokeStyle = "#ffd166";
                ctx.lineWidth = 12;
                ctx.lineCap = "round";
                ctx.lineJoin = "round";
                ctx.shadowBlur = 15;
                ctx.shadowColor = "#ffd166";
                ctx.moveTo(gameState.path[0].x, gameState.path[0].y);
                for(let i=1; i < gameState.path.length; i++) {
                    ctx.lineTo(gameState.path[i].x, gameState.path[i].y);
                }
                ctx.stroke(); 
                ctx.shadowBlur = 0; 
            }

            // Draw Checkered Finish Line
            for(let i=0; i<canvas.height; i+=20) {
                ctx.fillStyle = (i/20)%2===0 ? "#fff" : "#000";
                ctx.fillRect(gameState.finishX, i, 25, 20);
            }

            // Draw the Car
            ctx.fillStyle = gameState.car.color;
            ctx.beginPath();
            ctx.roundRect(gameState.car.x - 30, gameState.car.y - 15, 60, 25, 5);
            ctx.fill();
            ctx.fillStyle = "#111";
            ctx.beginPath(); ctx.arc(gameState.car.x-18, gameState.car.y+10, 8, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(gameState.car.x+18, gameState.car.y+10, 8, 0, Math.PI*2); ctx.fill();

            // Draw Moving Obstacles
            gameState.obstacles.forEach(o => {
                ctx.fillStyle = o.type === 'orbiter' ? "#00f2ff" : "#d400ff";
                ctx.shadowBlur = 10;
                ctx.shadowColor = ctx.fillStyle;
                ctx.fillRect(o.x, o.y, o.w, o.h);
                ctx.shadowBlur = 0;
            });

            // Status Overlays
            if(gameState.status === "fail") {
                ctx.fillStyle = "rgba(0,0,0,0.7)";
                ctx.fillRect(0,0,canvas.width, canvas.height);
                ctx.fillStyle = "#ff4d4f";
                ctx.font = "bold 45px Arial";
                ctx.textAlign = "center";
                ctx.fillText("FAILED — TRY AGAIN", canvas.width/2, canvas.height/2);
            }
            if(gameState.status === "win") {
                ctx.fillStyle = "#4ade80";
                ctx.font = "bold 45px Arial";
                ctx.textAlign = "center";
                ctx.fillText("LEVEL COMPLETE!", canvas.width/2, canvas.height/2);
            }

            requestAnimationFrame(gameLoop);
        }
        init();
    </script>
</body>
</html>
